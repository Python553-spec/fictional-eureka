<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishchi form</title>
</head>
<body>
    <h1>{% if ishchi %}Ishchini tahrirlash{% else %}Yangi ishchi{% endif %}</h1>

    <form method="POST">
        {% csrf_token %}
        <label>Ismi</label>
        <input type="text" name="name" value="{{ ishchi.name|default_if_none:'' }}" placeholder="Ismi" required>

        <label>Familiyasi</label>
        <input type="text" name="surname" value="{{ ishchi.surname|default_if_none:'' }}" placeholder="Familiyasi" required>

        <button type="submit">Saqlash</button>
        <a href="/ishchilar/">Bekor qilish</a>
    </form>

</body>
</html>
