{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Form</title>
    <link rel="stylesheet" href="{% static 'css/users.css' %}">
</head>
<body>
    <div class="container">
        <h1>Product Form</h1>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="form-content">
                {{ form.as_p }}
            </div>

            <div>
                {% if form.instance.image %}
                    <p>
                        <img src="{{ form.instance.image.url }}" alt="Product Image" style="max-width: 200px;">
                    </p>
                    <a href="{% url 'create_product' %}">View current image</a>
                {% endif %}
                
                <br>
                <a href="{% url 'create_product' %}">Back to list</a>
            </div>

            <br>
            <button type="submit">Save</button>
        </form>
    </div>
</body>
</html>
