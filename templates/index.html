<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Foydalanuvchi Formasi</title>
    <style>
        /* --- ASOSIY SOZLAMALAR --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* --- HARAKATLANUVCHI ORQA FON --- */
        body {
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            z-index: 1;
            animation: floatCircles 20s infinite alternate linear;
        }

        .circle-1 {
            width: 400px;
            height: 400px;
            background: #4f46e5;
            top: -100px;
            left: -100px;
        }

        .circle-2 {
            width: 300px;
            height: 300px;
            background: #ec4899;
            bottom: -50px;
            right: -50px;
            animation-delay: -5s;
        }

        @keyframes floatCircles {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 80px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(1); }
        }

        /* --- FORMA IDISHI (GLASSMORPHISM) --- */
        /* div o'rniga form tegini to'g'ridan-to'g'ri stilladik */
        form {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 480px;
            z-index: 10;
            animation: formAppear 1s ease-out;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        form:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 20px rgba(79, 70, 229, 0.2);
        }

        @keyframes formAppear {
            from { opacity: 0; transform: translateY(30px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 40px;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* --- FLOATING LABELS USLUBI --- */
        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 16px;
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
        }

        /* Fokus bo'lganda yoki valid (to'g'ri) ma'lumot kiritilganda */
        input:focus, 
        input:valid {
            border-color: #4f46e5;
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.3);
        }

        label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        /* input:valid orqali ichida matn borligida label yuqorida qoladi */
        input:focus ~ label,
        input:valid ~ label {
            top: 0;
            font-size: 12px;
            color: #4f46e5;
            transform: translateY(-50%) translateX(-5px);
        }

        /* --- YUBORISH TUGMASI --- */
        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4f46e5 0%, #a855f7 100%);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3), 0 0 30px rgba(168, 85, 247, 0.2);
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.5), 0 0 40px rgba(168, 85, 247, 0.4);
            transform: scale(1.02);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .submit-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            transition: all 0.5s ease;
        }

        .submit-btn:hover::after {
            left: 100%;
            top: 100%;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&display=swap" rel="stylesheet">
</head>
<body>
    
    <div class="bg-circle circle-1"></div>
    <div class="bg-circle circle-2"></div>

    
  
    
    <h1>Xush kelibsiz</h1>
    
<form action="" method="POST">
    
    <h1>Xush kelibsiz</h1>
    
    <div class="input-group">
        <input type="text" id="ism" name="ism" required>
        <label for="ism">Ismingizni kiriting</label>
    </div>
    
    <div class="input-group">
        <input type="text" id="familya" name="familya" required>
        <label for="familya">Familyangizni kiriting</label>
    </div>
    
    <div class="input-group">
        <input type="number" id="age" name="age" required min="1" max="120">
        <label for="age">Yoshingizni kiriting</label>
    </div>

<form method="POST" action="/yuborish/">
    {% csrf_token %}  <!-- Mana shu qator bo'lishi shart -->
    <input type="text" name="name">
    <button type="submit">Yuborish</button>
</form>
