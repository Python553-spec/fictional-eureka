{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moshlar</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="{% static 'css/moshn.css' %}">
</head>
<body>
    <style>
        /* === ASOSIY === */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    padding: 24px;
}

h1 {
    text-align: center;
    margin-bottom: 28px;
    font-size: 22px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.3px;
}

/* === QO'SHISH TUGMASI === */
.add-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    color: #fff;
    padding: 10px 22px;
    text-decoration: none;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    box-shadow: 0 4px 20px rgba(108, 99, 255, 0.45);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-bottom: 24px;
}
.add-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(108, 99, 255, 0.6);
}

/* === GRID === */
.product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
}

/* === KARTA === */
.product-card {
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 20px;
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s;
}
.product-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
}

/* === RASM === */
.product-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
}

/* === KARTA ICHIDAGI MATN === */
.product-card h3 {
    font-size: 15px;
    font-weight: 600;
    color: #f1f5f9;
    margin: 16px 18px 4px;
}
.product-card p {
    font-size: 13px;
    color: rgba(255, 255, 255, 0.5);
    margin: 0 18px 4px;
    line-height: 1.5;
}

/* === O'CHIRISH TUGMASI === */
.btn-delete {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.25);
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    margin: 14px 18px 18px;
    transition: background 0.2s, transform 0.2s;
    cursor: pointer;
}
.btn-delete:hover {
    background: rgba(239, 68, 68, 0.3);
    transform: scale(1.04);
}
    </style>
    <h1>Moshlar ruyxati</h1>
    <a href="/bola/" class="add-link">+ Yangi qo'shish</a>

    <div class="product-grid">
        {% for item in bolalar %}
            <div class="product-card">
                {% if item.rasm %}
                    <img src="{{ item.rasm.url }}" class="product-img">
                {% endif %}
                <h3>{{ item.name }}</h3>
                <p>Narxi: {{ item.narxi }} so'm</p>
                <p>{{ item.malumot }}</p>
                <a href="{% url 'bola_o_chirish' item.id %}" class="btn-delete" onclick="return confirm('O\'chirilsinmi?');">O'chirish</a>
            </div>
        {% endfor %}
    </div>
</body>
</html>
